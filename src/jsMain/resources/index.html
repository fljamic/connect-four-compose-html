<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connect Four</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap">
  <link rel=stylesheet href=https://cdn.jsdelivr.net/npm/pretty-print-json@3.0/dist/css/pretty-print-json.css>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: clamp(16px, 3vw, 32px) 16px;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      background: #f7f7f7;
      color: #111;
      display: flex;
      justify-content: center;
      overflow-x: hidden;
    }
    #root {
      width: 100%;
      display: flex;
      justify-content: center;
    }
    .app {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    :root {
      --board-scale: clamp(0.9, 0.85 + 0.5vw, 1.15);
    }
    .controls {
      display: flex;
      flex-wrap: nowrap;
      gap: 20px;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    .fields {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .field {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .fields input[type="number"] {
      width: 56px;
      padding: 6px 8px;
      font-size: 14px;
      border-radius: 8px;
    }
    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .actions button {
      padding: 8px 12px;
      font-size: 14px;
      border-radius: 10px;
    }
    .current-player {
      display: inline-block;
    }
    .player-swatch {
      display: block;
      width: 100%;
      height: 14px;
      border-radius: 4px;
      border: 1px solid #333;
      margin-top: 6px;
    }
    .board-wrap {
      display: block;
      width: 100%;
      max-width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 6px;
    }
    .board {
      transform: none;
      transform-origin: top center;
      width: max-content;
      margin: 0 auto;
    }
    @media (max-width: 900px) {
      body { padding: clamp(14px, 2.6vw, 24px) 12px; }
      .app { max-width: 100%; }
      .board-wrap { max-width: 100%; }
      :root { --board-scale: 1.0; }
      .controls { gap: 16px; }
    }
    @media (max-width: 720px) {
      .app { max-width: 100%; }
      .board-wrap { max-width: 100%; }
      :root { --board-scale: 0.98; }
      .controls {
        flex-wrap: wrap;
        align-items: flex-start;
      }
      .actions {
        width: 100%;
      }
    }
    @media (max-width: 520px) {
      .app { max-width: 100%; }
      .board-wrap { max-width: 100%; }
      :root { --board-scale: 0.9; }
      .controls {
        flex-direction: column;
        align-items: center;
      }
      .fields {
        width: 100%;
        justify-content: center;
      }
      .actions {
        width: 100%;
        justify-content: center;
      }
    }
    .piece {
      position: absolute;
      inset: 0;
      border-radius: 50%;
    }
    .slot-border {
      position: absolute;
      inset: 0;
      border: 1px solid #333;
      border-radius: 50%;
      pointer-events: none;
    }
    .piece.drop { animation: drop 320ms cubic-bezier(0.35, 0.0, 0.65, 1); }
    @keyframes drop {
      from { transform: translateY(calc(var(--drop-distance, 16px) * -1)); }
      to { transform: translateY(0); }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script src="connect-four.js"></script>
</body>
</html>
